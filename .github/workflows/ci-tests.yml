name: CI - Tests

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci-tests.yml"
  pull_request:
    paths:
      - "cmd/**"
      - "scripts/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/ci-tests.yml"
  workflow_dispatch:

jobs:
  test:
    name: Make lint + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test
